spring.application.name=DEZSYS_GK_WAREHOUSE_DOM

# --- MongoDB connection (central repository) ---
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/test}
spring.data.mongodb.database=${MONGO_DB:test}

# --- embedded web server ---
server.port=8080

# --- data generator client ---
# seed the repository via the REST interface on application startup
warehouse.client.seed-on-startup=true

# --- continuous storage scheduler ---
# set to true to periodically refresh the stock quantities with a new timestamp
warehouse.scheduler.enabled=false
warehouse.scheduler.rate=30000
