<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warehouse – Zentrale</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --surface: #ffffff;
      --border: #e2e4e9;
      --text: #1c1e21;
      --muted: #6b7280;
      --accent: #1f6feb;
      --accent-hover: #195bc4;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0; padding: 2.5rem 2rem; background: var(--bg); color: var(--text);
    }
    .wrap { max-width: 1100px; margin: 0 auto; }
    h1 { font-size: 1.35rem; font-weight: 600; margin: 0 0 1.75rem; }
    .controls {
      display: flex; gap: .75rem; flex-wrap: wrap; align-items: flex-end;
      margin-bottom: 1.25rem;
    }
    label { display: flex; flex-direction: column; gap: .3rem; font-size: .78rem; color: var(--muted); }
    select, input {
      padding: .5rem .65rem; font-size: .9rem; color: var(--text);
      border: 1px solid var(--border); border-radius: 6px; background: var(--surface); min-width: 11rem;
    }
    input[type=number] { min-width: 8rem; }
    select:focus, input:focus { outline: none; border-color: var(--accent); }
    button {
      padding: .55rem 1rem; font-size: .88rem; font-weight: 500;
      border: 1px solid var(--border); border-radius: 6px; cursor: pointer;
      background: var(--surface); color: var(--text);
    }
    button:hover { border-color: var(--accent); color: var(--accent); }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    button.primary:hover { background: var(--accent-hover); color: #fff; }
    .summary { margin: 0 0 .75rem; font-size: .82rem; color: var(--muted); }
    table {
      border-collapse: collapse; width: 100%; background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
    }
    th, td { padding: .6rem .8rem; text-align: left; font-size: .86rem; }
    th { background: #f0f1f4; color: var(--muted); font-weight: 600; position: sticky; top: 0; }
    td { border-top: 1px solid var(--border); }
    tbody tr:hover { background: #f8f9fb; }
    .meta { color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Warehouse – Zentrale</h1>

    <div class="controls">
      <label>Lagerstandort
        <select id="warehouse"><option value="">Alle</option></select>
      </label>
      <label>Kategorie
        <select id="category"><option value="">Alle</option></select>
      </label>
      <label>Max. Bestand
        <input id="maxqty" type="number" placeholder="z.B. 100">
      </label>
      <button class="primary" onclick="load()">Anzeigen</button>
      <button onclick="loadWarehouses()">Übersicht</button>
    </div>

    <div class="summary" id="summary"></div>
  <table>
    <thead>
      <tr>
        <th>Lager</th><th>Stadt</th><th>ProduktID</th><th>Produkt</th>
        <th>Kategorie</th><th>Bestand</th><th>Zeitstempel</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>
  </div>

<script>
const API = '';

async function fillFilters() {
  const products = await (await fetch(API + '/product')).json();
  const cats = [...new Set(products.map(p => p.productCategory))].sort();
  const whs  = [...new Set(products.map(p => p.warehouseID))].sort();
  const catSel = document.getElementById('category');
  const whSel  = document.getElementById('warehouse');
  cats.forEach(c => catSel.add(new Option(c, c)));
  whs.forEach(w => {
    const name = products.find(p => p.warehouseID === w)?.warehouseName || w;
    whSel.add(new Option(`${w} – ${name}`, w));
  });
}

function render(data) {
  const tbody = document.getElementById('rows');
  tbody.innerHTML = '';
  data.forEach(p => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${p.warehouseID ?? ''}</td><td>${p.warehouseCity ?? ''}</td>
      <td>${p.productID ?? ''}</td><td>${p.productName ?? ''}</td>
      <td>${p.productCategory ?? ''}</td><td>${p.productQuantity ?? ''}</td>
      <td class="meta">${(p.timestamp ?? '').toString().replace('T',' ').slice(0,19)}</td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('summary').textContent = `${data.length} Einträge`;
}

async function load() {
  const wh = document.getElementById('warehouse').value;
  const cat = document.getElementById('category').value;
  const max = document.getElementById('maxqty').value;
  let data;
  if (wh)        data = await (await fetch(`${API}/warehouse/${wh}`)).json();
  else if (cat)  data = await (await fetch(`${API}/report/category?name=${encodeURIComponent(cat)}`)).json();
  else if (max)  data = await (await fetch(`${API}/report/lowstock?max=${max}`)).json();
  else           data = await (await fetch(`${API}/product`)).json();

  if (cat) data = data.filter(p => p.productCategory === cat);
  if (max) data = data.filter(p => p.productQuantity <= Number(max));
  render(data);
}

async function loadWarehouses() {
  const data = await (await fetch(`${API}/warehouse`)).json();
  const tbody = document.getElementById('rows');
  tbody.innerHTML = '';
  data.forEach(w => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${w.warehouseID}</td><td>${w.warehouseCity}</td>
      <td colspan="2">${w.warehouseName}</td><td>Produkte: ${w.productCount}</td>
      <td colspan="2">Gesamtbestand: ${w.totalQuantity}</td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('summary').textContent = `${data.length} Lagerstandorte`;
}

fillFilters().then(load);
</script>
</body>
</html>
